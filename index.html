<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>극단 페이지</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
}

/* 네비게이션 */
.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 15px;
  background: white;
  border-bottom: 1px solid #ddd;
}

.logo {
  font-weight: bold;
}

.menu {
  font-size: 14px;
}

/* 상단 민트 배너 */
.top-banner {
  background: #7edbd2;
  text-align: center;
  padding: 8px;
  font-size: 14px;
  cursor: pointer;
}

/* 컨테이너 */
.container {
  max-width: 420px;
  margin: 0 auto;
  padding: 20px;
}

/* 공통 박스 */
.box {
  background: #ccc;
  margin-bottom: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  font-weight: bold;
}

/* 히어로 */
.hero {
  height: 180px;
  font-size: 20px;
}

/* 로고 영역 */
.logo-box {
  height: 120px;
  color: white;
}

/* 연혁 */
.history {
  height: 220px;
}

/* 가로 버튼 */
.wide-btn {
  height: 60px;
  background: #222;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.wide-btn:hover {
  background: #444;
}

/* 공연 그리드 */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.grid div {
  background: #ccc;
  height: 100px;
}

.section-title {
  text-align: center;
  margin: 20px 0 10px;
  font-weight: bold;
}

/* 푸터 */
footer {
  font-size: 12px;
  text-align: center;
  margin-top: 30px;
}

</style>
</head>

<body>

<!-- 네비 -->
<div class="nav">
  <div class="logo">극단 백일몽</div>
  <div class="menu">메뉴</div>
</div>

<!-- 민트 배너 -->
<div class="top-banner" onclick="location.href='#'">
  📌 극단 백일몽 후원하러 가기
</div>

<div class="container">

  <!-- 히어로 -->
  <div class="box hero">
    가장 최근 사진 혹은 이벤트
  </div>

  <!-- 로고 -->
  <div class="box logo-box">
    로고
  </div>

  <!-- 연혁 -->
  <div class="box history">
    연혁
  </div>

  <!-- 버튼 -->
  <div class="box wide-btn" onclick="location.href='#'">
    디딤프로젝트 보러가기
  </div>

  <div class="box wide-btn" onclick="location.href='#'">
    워크숍 신청하기
  </div>

  <!-- 공연 -->
  <div class="section-title">공연별 사진</div>

  <div class="grid">
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
  </div>

  <footer>
    단체명 : 극단 백일몽 <br>
    이메일 : ekdud0423@gmail.com <br>
    ©2026 극단 백일몽
  </footer>

</div>

</body>
</html>
