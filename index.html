<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>극단 백일몽</title>
<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
}

/* 네비게이션 */
.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 5%;
  background: white;
  border-bottom: 1px solid #ddd;
}

.logo { font-weight: bold; font-size: 1.2rem; }
.menu { font-size: 14px; }

/* 상단 배너 */
.top-banner {
  background: #C4B4C7;
  text-align: center;
  padding: 10px;
  font-size: 14px;
  cursor: pointer;
}

/* 컨테이너 */
.container {
  width: 90%;
  max-width: 500px;
  margin: 0 auto;
  padding: 20px 0;
}

/* PC 버전일 때 */
@media (min-width: 768px) {
  .container {
    max-width: 1200px;
  }
  .grid {
    grid-template-columns: repeat(4, 1fr) !important;
  }
}

/* 공통 박스 */
.box {
  background: #ccc;
  margin-bottom: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  font-weight: bold;
}

/* 공연별 사진 그리드 */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 30px;
}
.grid div { 
  background: #ddd; 
  height: 200px; 
  overflow: hidden;
  border-radius: 8px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}
.grid img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 로고 영역 */
.logo-box { height: 120px; color: white; }

/* 연혁 */
.history { height: 220px; }

/* 버튼 */
.wide-btn {
  height: 60px;
  background: #5B4A54;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
  text-decoration: none;
  margin-bottom: 15px;
}
.wide-btn:hover { background: #444; }

.section-title {
  text-align: center;
  margin: 10px 0 15px;
  font-weight: bold;
  font-size: 1.1rem;
}

footer {
  font-size: 12px;
  text-align: center;
  margin-top: 50px;
  padding-bottom: 30px;
  color: #666;
}
</style>
</head>
<body>

<div class="nav">
  <div class="logo">극단 백일몽</div>
  <div class="menu">메뉴</div>
</div>

<div class="top-banner" onclick="location.href='#'">
  📌 극단 백일몽 후원하러 가기
</div>

<div class="container">
  <div class="section-title">공연별 사진</div>
  
  <div class="grid">
    <div><img src="https://raw.githubusercontent.com/ekdud0423/daydream/b8c969938546a9e224b15368727313d3a0effe63/warm1.jpg" alt="warm1"></div>
    <div><img src="https://raw.githubusercontent.com/ekdud0423/daydream/b8c969938546a9e224b15368727313d3a0effe63/warm2.png" alt="warm2"></div>
    <div><img src="https://raw.githubusercontent.com/ekdud0423/daydream/b8c969938546a9e224b15368727313d3a0effe63/warm3.jpg" alt="warm3"></div>
    <div><img src="https://raw.githubusercontent.com/ekdud0423/daydream/b8c969938546a9e224b15368727313d3a0effe63/warm4.jpg" alt="warm4"></div>
    <div><img src="https://raw.githubusercontent.com/ekdud0423/daydream/b8c969938546a9e224b15368727313d3a0effe63/never1.jpg" alt="never1"></div>
    <div><img src="https://raw.githubusercontent.com/ekdud0423/daydream/b8c969938546a9e224b15368727313d3a0effe63/never2.jpg" alt="never2"></div>
    <div><img src="https://raw.githubusercontent.com/ekdud0423/daydream/b8c969938546a9e224b15368727313d3a0effe63/never3.jpg" alt="never3"></div>
    <div><img src="https://raw.githubusercontent.com/ekdud0423/daydream/b8c969938546a9e224b15368727313d3a0effe63/never4.jpg" alt="never4"></div>
  </div>

  <div class="box logo-box">로고</div>
  <div class="box history">연혁</div>
  
  <a href="https://ekdud0423.github.io/D-dim-project/" class="wide-btn">디딤프로젝트 보러가기</a>
  <a href="https://linktr.ee/daydream101" class="wide-btn">워크숍 신청하기</a>

  <footer>
    단체명 : 극단 백일몽 <br>
    이메일 : ekdud0423@gmail.com <br>
    ©2026 극단 백일몽
  </footer>
</div>

</body>
</html>
