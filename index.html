<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>극단 백일몽 홈페이지</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
}

/* 네비게이션 */
.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 15px;
  background: white;
  border-bottom: 1px solid #ddd;
}

.logo {
  font-weight: bold;
}

.menu {
  font-size: 14px;
}

/* 상단 민트 배너 */
.top-banner {
  background: #C4B4C7;
  text-align: center;
  padding: 8px;
  font-size: 14px;
  cursor: pointer;
}

/* 컨테이너 */
.container {
  max-width: 420px;
  margin: 0 auto;
  padding: 20px;
}

/* 공통 박스 */
.box {
  background: #ccc;
  margin-bottom: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  font-weight: bold;
}

/* 히어로 */
.hero {
  position: relative;
  width: 100%;
  max-width: 500px;
  height: 300px;
  overflow: hidden;
}

.hero img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  animation: fade 25s infinite;
}

.hero img:nth-child(1) { animation-delay: 0s; }
.hero img:nth-child(2) { animation-delay: 5s; }
.hero img:nth-child(3) { animation-delay: 10s; }
.hero img:nth-child(4) { animation-delay: 15s; }
.hero img:nth-child(5) { animation-delay: 20s; }

@keyframes fade {
  0% { opacity: 0; }
  8% { opacity: 1; }
  40% { opacity: 1; }
  48% { opacity: 0; }
  100% { opacity: 0; }
}
/* 로고 영역 */
.logo-box {
  height: 120px;
  color: white;
}

/* 연혁 */
.history {
  height: 220px;
}

/* 가로 버튼 */
.wide-btn {
  height: 60px;
  background: #5B4A54;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.wide-btn:hover {
  background: #444;
}

/* 공연 그리드 */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.grid div {
  background: #ccc;
  height: 100px;
}

.section-title {
  text-align: center;
  margin: 20px 0 10px;
  font-weight: bold;
}

/* 푸터 */
footer {
  font-size: 12px;
  text-align: center;
  margin-top: 30px;
}

</style>
</head>

<body>

<!-- 네비 -->
<div class="nav">
  <div class="logo">극단 백일몽</div>
  <div class="menu">메뉴</div>
</div>

<!-- 민트 배너 -->
<div class="top-banner" onclick="location.href='#'">
  📌 극단 백일몽 후원하러 가기
</div>

<div class="container">

  <!-- 히어로 -->
  <div class="hero">
<div class="hero">
  <img src="https://raw.githubusercontent.com/ekdud0423/daydream/6b87f1cbdd3c5163d065355c7249e06e2407ce26/KakaoTalk_20260318_222256249_01.jpg">

  <img src="https://raw.githubusercontent.com/ekdud0423/daydream/6b87f1cbdd3c5163d065355c7249e06e2407ce26/KakaoTalk_20260318_222256249_02.jpg">

  <img src="https://raw.githubusercontent.com/ekdud0423/daydream/6b87f1cbdd3c5163d065355c7249e06e2407ce26/KakaoTalk_20260318_222431455.jpg">

  <img src="https://raw.githubusercontent.com/ekdud0423/daydream/6b87f1cbdd3c5163d065355c7249e06e2407ce26/KakaoTalk_20260318_222431455.jpg">

  <img src="https://raw.githubusercontent.com/ekdud0423/daydream/6b87f1cbdd3c5163d065355c7249e06e2407ce26/KakaoTalk_20260318_222431455.jpg">
</div>
</div>

  <!-- 로고 -->
  <div class="box logo-box">
    로고
  </div>

  <!-- 연혁 -->
  <div class="box history">
    연혁
  </div>

  <!-- 버튼 -->
  <div class="box wide-btn" onclick="location.href='https://ekdud0423.github.io/D-dim-project/'">
    디딤프로젝트 보러가기
  </div>

  <div class="box wide-btn" onclick="location.href='https://linktr.ee/daydream101'">
    워크숍 신청하기
  </div>

  <!-- 공연 -->
  <div class="section-title">공연별 사진</div>

  <div class="grid">
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
  </div>

  <footer>
    단체명 : 극단 백일몽 <br>
    이메일 : ekdud0423@gmail.com <br>
    ©2026 극단 백일몽
  </footer>

</div>

</body>
</html>
